<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Check - Tra cứu Free Fire</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #070712;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,136,255,0.08), transparent);
  pointer-events: none;
}
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.15; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
  padding: 20px;
}
.card {
  background: linear-gradient(145deg, rgba(16,16,40,0.97), rgba(8,8,24,0.97));
  border: 1px solid rgba(0,136,255,0.2);
  border-radius: 24px;
  padding: 40px 32px;
  box-shadow: 0 0 60px rgba(0,136,255,0.06), inset 0 1px 0 rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  transition: border-color 0.4s;
}
.card:hover { border-color: rgba(0,136,255,0.35); }
h1 {
  font-size: 30px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #0088ff, #40bbff, #0088ff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }
.subtitle {
  text-align: center;
  color: #556;
  font-size: 13px;
  margin-bottom: 28px;
  font-weight: 400;
  letter-spacing: 0.3px;
}
.input-group {
  display: flex;
  gap: 10px;
}
.input-group input {
  flex: 1;
  padding: 15px 20px;
  border: 1px solid rgba(0,136,255,0.2);
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  outline: none;
  transition: 0.3s;
}
.input-group input:focus {
  border-color: #0088ff;
  box-shadow: 0 0 20px rgba(0,136,255,0.12);
  background: rgba(255,255,255,0.06);
}
.input-group input::placeholder { color: #445; font-weight: 400; }
.input-group button {
  padding: 15px 28px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #0088ff, #0055bb);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.input-group button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,136,255,0.35);
}
.input-group button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.result {
  margin-top: 28px;
  display: none;
}
.result.show { display: block; }
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: 14px;
  margin-bottom: 20px;
  font-weight: 700;
  font-size: 14px;
  line-height: 1.4;
}
.status-online {
  background: rgba(0,200,80,0.08);
  border: 1px solid rgba(0,200,80,0.25);
  color: #00e860;
}
.status-offline {
  background: rgba(255,50,50,0.08);
  border: 1px solid rgba(255,50,50,0.2);
  color: #ff4040;
}
.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-online .status-dot { background: #00e860; box-shadow: 0 0 12px #00e860; }
.status-offline .status-dot { background: #ff4040; box-shadow: 0 0 12px #ff4040; }
.status-sub {
  display: block;
  font-weight: 500;
  font-size: 12px;
  opacity: 0.6;
  margin-top: 1px;
}
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.info-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 16px 18px;
  transition: 0.25s;
  position: relative;
  overflow: hidden;
}
.info-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  border-radius: 16px 0 0 16px;
  opacity: 0;
  transition: 0.25s;
}
.info-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(0,136,255,0.2);
  transform: translateY(-1px);
}
.info-item:hover::before { opacity: 1; }
.info-item.full { grid-column: 1 / -1; }
.info-item.likes {
  background: rgba(255,180,0,0.05);
  border-color: rgba(255,180,0,0.12);
}
.info-item.likes::before { background: #ffb800; }
.info-item.likes:hover { border-color: rgba(255,180,0,0.25); }
.info-item.nick { grid-column: 1 / -1; }
.info-item.nick::before { background: #0088ff; }
.info-item.nick .info-value { font-size: 20px; text-align: center; }
.info-item.level::before { background: #a855f7; }
.info-item.level .info-value { color: #c084fc; }
.info-item.region::before { background: #22d3ee; }
.info-item.region .info-value { color: #67e8f9; }
.info-item.date::before { background: #34d399; }
.info-item.date .info-value { color: #6ee7b7; }
.info-item.guild::before { background: #f97316; }
.info-item.guild .info-value { color: #fb923c; }
.info-label {
  font-size: 11px;
  color: #667;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  margin-bottom: 6px;
}
.info-value {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.info-value.likes-val { color: #ffb800; font-size: 22px; }
.error {
  color: #ff5555;
  text-align: center;
  margin-top: 15px;
  padding: 14px;
  background: rgba(255,50,50,0.07);
  border: 1px solid rgba(255,50,50,0.15);
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  display: none;
}
.error.show { display: block; }
.loading {
  text-align: center;
  margin-top: 24px;
  display: none;
}
.loading.show { display: block; }
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(0,136,255,0.1);
  border-top-color: #0088ff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #556; font-size: 13px; font-weight: 500; }
@media (max-width: 480px) {
  .input-group { flex-direction: column; }
  .info-grid { grid-template-columns: 1fr; }
  .card { padding: 28px 18px; }
  h1 { font-size: 26px; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="card">
    <h1>FF Check</h1>
    <p class="subtitle">Tra cứu thông tin tài khoản Free Fire</p>
    <div class="input-group">
      <input type="text" id="uidInput" placeholder="Nhập UID..." maxlength="15">
      <button id="checkBtn" onclick="check()">Tra cứu</button>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span class="loading-text">Đang tra cứu...</span>
    </div>
    <div class="result" id="result">
      <div class="status-bar" id="statusBar">
        <span class="status-dot"></span>
        <span id="statusText"></span>
      </div>
      <div class="info-grid">
        <div class="info-item nick">
          <div class="info-label">👤 Nickname</div>
          <div class="info-value" id="nickname">-</div>
        </div>
        <div class="info-item level">
          <div class="info-label">⭐ Level</div>
          <div class="info-value" id="level">-</div>
        </div>
        <div class="info-item likes">
          <div class="info-label">❤️ Lượt thích</div>
          <div class="info-value likes-val" id="liked">-</div>
        </div>
        <div class="info-item region">
          <div class="info-label">🌍 Quốc gia</div>
          <div class="info-value" id="region">-</div>
        </div>
        <div class="info-item date">
          <div class="info-label">📅 Ngày tạo</div>
          <div class="info-value" id="createDate">-</div>
        </div>
        <div class="info-item guild">
          <div class="info-label">🏰 Guild</div>
          <div class="info-value" id="guild">-</div>
        </div>
      </div>
    </div>
    <div class="error" id="error"></div>
  </div>
</div>
<script>
const REGION_NAMES = {
  'SG': 'Singapore', 'IND': 'India', 'BD': 'Bangladesh',
  'ID': 'Indonesia', 'TH': 'Thái Lan', 'TW': 'Đài Loan',
  'VN': 'Việt Nam', 'BR': 'Brazil', 'US': 'Bắc Mỹ',
  'EU': 'Châu Âu', 'NP': 'Nepal', 'ME': 'Trung Đông',
  'RU': 'Nga', 'PK': 'Pakistan', 'SAC': 'Nam Mỹ'
};

function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
    c.appendChild(s);
  }
}
createStars();

function fmtNum(n) {
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function fmtDateTime(ts) {
  const d = new Date(ts * 1000);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return hh + ':' + mm + ' ' + dd + '/' + mo + '/' + yyyy;
}

function timeAgo(ts) {
  if (!ts) return 'không rõ';
  const diff = Math.floor(Date.now() / 1000 - ts);
  if (diff < 60) return 'vừa xong';
  if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
  if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
  return Math.floor(diff / 86400) + ' ngày trước';
}

function countryName(code) {
  return REGION_NAMES[code] || code;
}

async function check() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid || uid.length < 6 || !/^\d+$/.test(uid)) {
    showError('UID không hợp lệ (6-15 chữ số)');
    return;
  }
  const btn = document.getElementById('checkBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const error = document.getElementById('error');
  btn.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');
  error.classList.remove('show');
  try {
    const res = await fetch('/api/check?uid=' + uid);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    displayResult(data);
  } catch (e) {
    showError('Lỗi kết nối máy chủ');
  } finally {
    btn.disabled = false;
    loading.classList.remove('show');
  }
}

function displayResult(d) {
  const bar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  bar.className = 'status-bar ' + (d.online ? 'status-online' : 'status-offline');
  if (d.online) {
    statusText.innerHTML = '🟢 Đang online';
  } else {
    const dt = fmtDateTime(d.lastLoginAt);
    const ago = timeAgo(d.lastLoginAt);
    statusText.innerHTML = '🔴 Offline từ ' + dt + '<span class="status-sub">' + ago + '</span>';
  }
  document.getElementById('nickname').textContent = d.nickname;
  document.getElementById('level').textContent = d.level;
  document.getElementById('liked').textContent = fmtNum(d.liked);
  document.getElementById('createDate').textContent = d.accountAge;
  document.getElementById('region').textContent = countryName(d.region);
  document.getElementById('guild').textContent = d.guild || 'Không có';
  document.getElementById('result').classList.add('show');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('result').classList.remove('show');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Check - Tra cứu Free Fire</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #050510;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 100% 70% at 50% -20%, rgba(0,136,255,0.1), transparent),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(120,0,255,0.06), transparent),
    radial-gradient(ellipse 50% 60% at 20% 90%, rgba(0,200,255,0.04), transparent);
  pointer-events: none;
}

/* Animated grid background */
.grid-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 8s linear infinite;
  perspective: 500px;
}
@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(60px); }
}

/* Shooting stars */
.shooting-star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 4px #fff, 0 0 8px rgba(0,136,255,0.5);
  animation: shoot var(--dur) linear infinite;
  opacity: 0;
  z-index: 1;
}
.shooting-star::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 60px;
  height: 1px;
  background: linear-gradient(to left, rgba(0,136,255,0.4), transparent);
  transform: translateY(-50%);
}
@keyframes shoot {
  0% { transform: translate(0, 0) rotate(-35deg); opacity: 0; }
  5% { opacity: 1; }
  50% { transform: translate(-400px, 280px) rotate(-35deg); opacity: 0.8; }
  100% { transform: translate(-800px, 560px) rotate(-35deg); opacity: 0; }
}

.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.1; transform: scale(0.6); }
  100% { opacity: 1; transform: scale(1); }
}

.container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 520px;
  padding: 20px;
}

/* Glowing border animation */
@keyframes borderGlow {
  0%, 100% { border-color: rgba(0,136,255,0.2); box-shadow: 0 0 40px rgba(0,136,255,0.06); }
  50% { border-color: rgba(0,136,255,0.4); box-shadow: 0 0 60px rgba(0,136,255,0.12), 0 0 80px rgba(0,136,255,0.04); }
}
.card {
  background: linear-gradient(145deg, rgba(18,18,45,0.97), rgba(8,8,25,0.97));
  border: 1px solid rgba(0,136,255,0.2);
  border-radius: 24px;
  padding: 40px 32px;
  box-shadow: 0 0 40px rgba(0,136,255,0.06), inset 0 1px 0 rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  animation: borderGlow 4s ease-in-out infinite;
}
.card::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, transparent, rgba(0,136,255,0.1), transparent, rgba(0,136,255,0.05), transparent);
  border-radius: 26px;
  z-index: -1;
  animation: cardBorder 6s linear infinite;
  opacity: 0.5;
}
@keyframes cardBorder {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,136,255,0.04), transparent 70%);
  pointer-events: none;
}

h1 {
  font-size: 32px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #0088ff, #40bbff, #80ddff, #40bbff, #0088ff);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 4s linear infinite;
  position: relative;
}
@keyframes shimmer { to { background-position: 300% center; } }

.subtitle {
  text-align: center;
  color: #556;
  font-size: 13px;
  margin-bottom: 28px;
  font-weight: 400;
  letter-spacing: 0.3px;
}

.input-group {
  display: flex;
  gap: 10px;
  position: relative;
}
.input-group input {
  flex: 1;
  padding: 16px 20px;
  border: 1px solid rgba(0,136,255,0.2);
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  outline: none;
  transition: 0.3s;
}
.input-group input:focus {
  border-color: #0088ff;
  box-shadow: 0 0 25px rgba(0,136,255,0.15), inset 0 0 20px rgba(0,136,255,0.03);
  background: rgba(255,255,255,0.07);
}
.input-group input::placeholder { color: #445; font-weight: 400; }
.input-group button {
  padding: 16px 30px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #0088ff, #0044aa);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
  white-space: nowrap;
  letter-spacing: 0.3px;
  position: relative;
  overflow: hidden;
}
.input-group button::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: 0.5s;
}
.input-group button:hover::before { left: 100%; }
.input-group button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,136,255,0.4);
}
.input-group button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.result {
  margin-top: 28px;
  display: none;
}
.result.show {
  display: block;
  animation: slideUp 0.5s ease-out;
}
@keyframes slideUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  font-weight: 700;
  font-size: 14px;
  line-height: 1.4;
  animation: statusIn 0.4s ease-out;
}
@keyframes statusIn {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
.status-online {
  background: rgba(0,200,80,0.1);
  border: 1px solid rgba(0,200,80,0.3);
  color: #00e860;
  box-shadow: 0 0 20px rgba(0,200,80,0.05);
}
.status-offline {
  background: rgba(255,50,50,0.08);
  border: 1px solid rgba(255,50,50,0.2);
  color: #ff4040;
}
.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-online .status-dot {
  background: #00e860;
  box-shadow: 0 0 15px #00e860;
  animation: pulseOnline 1.5s ease-in-out infinite;
}
@keyframes pulseOnline {
  0%, 100% { box-shadow: 0 0 10px #00e860; }
  50% { box-shadow: 0 0 25px #00e860, 0 0 40px rgba(0,232,96,0.3); }
}
.status-offline .status-dot {
  background: #ff4040;
  box-shadow: 0 0 10px #ff4040;
}
.status-sub {
  display: block;
  font-weight: 500;
  font-size: 12px;
  opacity: 0.6;
  margin-top: 2px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.info-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 16px 18px;
  transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  animation: itemFade 0.5s ease-out backwards;
}
.info-item:nth-child(1) { animation-delay: 0.05s; }
.info-item:nth-child(2) { animation-delay: 0.1s; }
.info-item:nth-child(3) { animation-delay: 0.15s; }
.info-item:nth-child(4) { animation-delay: 0.2s; }
.info-item:nth-child(5) { animation-delay: 0.25s; }
.info-item:nth-child(6) { animation-delay: 0.3s; }
@keyframes itemFade {
  0% { opacity: 0; transform: translateY(12px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.info-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  border-radius: 16px 0 0 16px;
  opacity: 0;
  transition: 0.3s;
}
.info-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(0,136,255,0.2);
  transform: translateY(-2px) scale(1.01);
}
.info-item:hover::before { opacity: 1; }
.info-item::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.02));
  pointer-events: none;
}
.info-item.nick { grid-column: 1 / -1; }
.info-item.nick::before { background: #0088ff; }
.info-item.nick .info-value { font-size: 20px; text-align: center; }
.info-item.level::before { background: #a855f7; }
.info-item.level .info-value { color: #c084fc; }
.info-item.likes {
  background: rgba(255,180,0,0.06);
  border-color: rgba(255,180,0,0.12);
}
.info-item.likes::before { background: #ffb800; }
.info-item.likes:hover { border-color: rgba(255,180,0,0.3); }
.info-item.likes .info-value { color: #ffb800; font-size: 22px; }
.info-item.likes .info-label { color: #cc9600; }
.info-item.region::before { background: #22d3ee; }
.info-item.region .info-value { color: #67e8f9; }
.info-item.date::before { background: #34d399; }
.info-item.date .info-value { color: #6ee7b7; }
.info-item.guild::before { background: #f97316; }
.info-item.guild .info-value { color: #fb923c; }
.info-label {
  font-size: 10px;
  color: #556;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
  margin-bottom: 6px;
}
.info-value {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.error {
  color: #ff5555;
  text-align: center;
  margin-top: 15px;
  padding: 14px 20px;
  background: rgba(255,50,50,0.08);
  border: 1px solid rgba(255,50,50,0.15);
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  display: none;
  animation: shake 0.4s ease-out;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.error.show { display: block; }

.loading {
  text-align: center;
  margin-top: 28px;
  display: none;
}
.loading.show { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(0,136,255,0.08);
  border-top-color: #0088ff;
  border-right-color: #0088ff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-dots { display: inline-flex; gap: 4px; margin-left: 4px; }
.loading-dots span {
  width: 4px; height: 4px;
  background: #556;
  border-radius: 50%;
  animation: dotBounce 1s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
.loading-text { color: #556; font-size: 14px; font-weight: 500; }

/* Floating orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb-1 {
  width: 200px; height: 200px;
  background: rgba(0,136,255,0.08);
  top: -10%; left: -10%;
  animation-delay: 0s;
}
.orb-2 {
  width: 150px; height: 150px;
  background: rgba(120,0,255,0.06);
  bottom: -5%; right: -5%;
  animation-delay: -3s;
}
.orb-3 {
  width: 120px; height: 120px;
  background: rgba(0,200,255,0.05);
  top: 50%; right: -8%;
  animation-delay: -6s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.9); }
}

@media (max-width: 480px) {
  .input-group { flex-direction: column; }
  .info-grid { grid-template-columns: 1fr; }
  .card { padding: 28px 18px; }
  h1 { font-size: 26px; }
  .orb { display: none; }
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-bg"></div>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="card">
    <h1>FF Check</h1>
    <p class="subtitle">Tra cứu thông tin tài khoản Free Fire</p>
    <div class="input-group">
      <input type="text" id="uidInput" placeholder="Nhập UID..." maxlength="15">
      <button id="checkBtn" onclick="check()">Tra cứu</button>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span class="loading-text">Đang tra cứu<span class="loading-dots"><span></span><span></span><span></span></span></span>
    </div>
    <div class="result" id="result">
      <div class="status-bar" id="statusBar">
        <span class="status-dot"></span>
        <span id="statusText"></span>
      </div>
      <div class="info-grid">
        <div class="info-item nick">
          <div class="info-label">👤 Nickname</div>
          <div class="info-value" id="nickname">-</div>
        </div>
        <div class="info-item level">
          <div class="info-label">⭐ Level</div>
          <div class="info-value" id="level">-</div>
        </div>
        <div class="info-item likes">
          <div class="info-label">❤️ Lượt thích</div>
          <div class="info-value" id="liked">-</div>
        </div>
        <div class="info-item region">
          <div class="info-label">🌍 Quốc gia</div>
          <div class="info-value" id="region">-</div>
        </div>
        <div class="info-item date">
          <div class="info-label">📅 Ngày tạo</div>
          <div class="info-value" id="createDate">-</div>
        </div>
        <div class="info-item guild">
          <div class="info-label">🏰 Guild</div>
          <div class="info-value" id="guild">-</div>
        </div>
      </div>
    </div>
    <div class="error" id="error"></div>
  </div>
</div>
<script>
const REGION_NAMES = {
  'SG': 'Singapore', 'IND': 'India', 'BD': 'Bangladesh',
  'ID': 'Indonesia', 'TH': 'Thái Lan', 'TW': 'Đài Loan',
  'VN': 'Việt Nam', 'BR': 'Brazil', 'US': 'Bắc Mỹ',
  'EU': 'Châu Âu', 'NP': 'Nepal', 'ME': 'Trung Đông',
  'RU': 'Nga', 'PK': 'Pakistan', 'SAC': 'Nam Mỹ'
};

function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
    const size = 1 + Math.random() * 2;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    c.appendChild(s);
  }
}
createStars();

// Shooting stars
function createShootingStars() {
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('div');
    s.className = 'shooting-star';
    s.style.top = (5 + Math.random() * 20) + '%';
    s.style.left = (60 + Math.random() * 40) + '%';
    s.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
    s.style.animationDelay = (i * 4 + Math.random() * 3) + 's';
    document.body.appendChild(s);
  }
}
createShootingStars();

function fmtNum(n) {
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function fmtDateTime(ts) {
  const d = new Date(ts * 1000);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return hh + ':' + mm + ' ' + dd + '/' + mo + '/' + yyyy;
}

function timeAgo(ts) {
  if (!ts) return 'không rõ';
  const diff = Math.floor(Date.now() / 1000 - ts);
  if (diff < 60) return 'vừa xong';
  if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
  if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
  return Math.floor(diff / 86400) + ' ngày trước';
}

function countryName(code) {
  return REGION_NAMES[code] || code;
}

async function check() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid || uid.length < 6 || !/^\d+$/.test(uid)) {
    showError('UID không hợp lệ (6-15 chữ số)');
    return;
  }
  const btn = document.getElementById('checkBtn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const error = document.getElementById('error');
  btn.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');
  error.classList.remove('show');
  try {
    const res = await fetch('/api/check?uid=' + uid);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    displayResult(data);
  } catch (e) {
    showError('Lỗi kết nối máy chủ');
  } finally {
    btn.disabled = false;
    loading.classList.remove('show');
  }
}

function displayResult(d) {
  const bar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  bar.className = 'status-bar ' + (d.online ? 'status-online' : 'status-offline');
  if (d.online) {
    statusText.innerHTML = '🟢 Đang online';
  } else {
    const dt = fmtDateTime(d.lastLoginAt);
    const ago = timeAgo(d.lastLoginAt);
    statusText.innerHTML = '🔴 Offline từ ' + dt + '<span class="status-sub">' + ago + '</span>';
  }
  document.getElementById('nickname').textContent = d.nickname;
  document.getElementById('level').textContent = d.level;
  document.getElementById('liked').textContent = fmtNum(d.liked);
  document.getElementById('createDate').textContent = d.accountAge;
  document.getElementById('region').textContent = countryName(d.region);
  document.getElementById('guild').textContent = d.guild || 'Không có';
  document.getElementById('result').classList.add('show');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('result').classList.remove('show');
}
</script>
</body>
</html>
